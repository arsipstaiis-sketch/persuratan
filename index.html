<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Penomoran STAIIS</title>
    <style>
        :root {
            --staiis-green: #128246;
            --staiis-green-hover: #0e6b39;
            --text-dark: #1f2124;
            --text-gray: #5e6b73;
            --bg-light: #f7f9fc;
            --border-light: #e1e4e8;
            --input-bg: #ffffff;
        }

        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen, sans-serif;
            background-color: #ffffff; 
            color: var(--text-dark); 
            margin: 0; 
            padding: 40px 20px;
        }

        .container { max-width: 800px; margin: 0 auto; }

        .header-section { text-align: center; margin-bottom: 30px; }
        .header-section h1 { font-size: 2.5rem; font-weight: 800; margin: 0 0 10px 0; }
        .header-section h1 span { color: var(--staiis-green); }
        .header-section p { font-size: 1.1rem; color: var(--text-gray); margin: 0; }
        
        /* Navigasi Tab */
        .tab-container { display: flex; border-bottom: 2px solid var(--border-light); margin-bottom: 30px; }
        .tab-btn {
            background: none; border: none; padding: 15px 30px; font-size: 16px; font-weight: 700;
            color: var(--text-gray); cursor: pointer; transition: all 0.3s ease; position: relative;
        }
        .tab-btn.active { color: var(--staiis-green); }
        .tab-btn.active::after {
            content: ''; position: absolute; bottom: -2px; left: 0; width: 100%; height: 3px;
            background-color: var(--staiis-green); border-radius: 3px 3px 0 0;
        }
        
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeIn 0.4s; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .form-card { background: var(--bg-light); border: 1px solid var(--border-light); border-radius: 16px; padding: 35px; }
        form { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .form-group { display: flex; flex-direction: column; }
        .form-group label { font-size: 13px; font-weight: 600; margin-bottom: 8px; }
        
        input, select { 
            padding: 14px 16px; background: var(--input-bg); border: 1px solid var(--border-light); 
            border-radius: 10px; font-size: 15px; outline: none; transition: all 0.2s ease; font-family: inherit;
        }
        input:focus, select:focus { border-color: var(--staiis-green); box-shadow: 0 0 0 3px rgba(18, 130, 70, 0.15); }
        .full-width { grid-column: 1 / -1; }
        
        /* Elemen Copy Nomor */
        .input-with-icon { position: relative; display: flex; align-items: center; }
        .input-with-icon input { width: 100%; padding-right: 50px; background-color: #edf2f0; color: var(--staiis-green); font-weight: 700; border-color: transparent; cursor: default; }
        .copy-btn {
            position: absolute; right: 5px; background: rgba(18, 130, 70, 0.1); color: var(--staiis-green);
            border: none; padding: 10px; border-radius: 8px; cursor: pointer; display: flex; transition: all 0.2s;
        }
        .copy-btn:hover { background: rgba(18, 130, 70, 0.2); transform: scale(1.05); }
        .copy-btn svg { width: 20px; height: 20px; fill: currentColor; }

        button.btn-primary { 
            background: var(--staiis-green); color: white; border: none; padding: 16px; border-radius: 10px;
            font-size: 16px; font-weight: 700; cursor: pointer; margin-top: 10px; transition: all 0.2s;
        }
        button.btn-primary:hover:not(:disabled) { background: var(--staiis-green-hover); box-shadow: 0 6px 12px rgba(18, 130, 70, 0.3); }
        button.btn-primary:disabled { background: #cbd5e0; cursor: wait; }

        .file-upload-box { border: 2px dashed var(--border-light); padding: 30px; text-align: center; border-radius: 10px; background: white; }
        .file-upload-box input[type="file"] { border: none; padding: 0; margin-top: 10px; }

        @media (max-width: 600px) { form { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

    <div class="container">
        <div class="header-section">
            <h1>Sistem Penomoran <span>STAIIS</span></h1>
            <p>Aplikasi pembuatan nomor surat dan arsip dokumen digital.</p>
        </div>

        <!-- Navigasi -->
        <div class="tab-container">
            <button class="tab-btn active" onclick="switchTab('penomoran', this)">Ambil Nomor Surat</button>
            <button class="tab-btn" onclick="switchTab('upload', this)">Upload Berkas Scan</button>
        </div>

        <!-- TAB 1: AMBIL NOMOR SURAT -->
        <div id="penomoran" class="tab-content active form-card">
            <div id="loadingStatus" style="margin-bottom:15px; color:var(--text-gray); font-size:14px;">Memuat data referensi...</div>
            <form id="formPenomoran">
                <div class="form-group">
                    <label>Tanggal Surat</label>
                    <input type="date" id="tanggal" required onchange="generateNomorOtomatis()">
                </div>
                <div class="form-group">
                    <label>Nama Divisi</label>
                    <select id="divisi" required onchange="generateNomorOtomatis()">
                        <option value="" disabled selected>Memuat referensi...</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Jenis Surat</label>
                    <select id="jenis" required onchange="generateNomorOtomatis()">
                        <option value="" disabled selected>Memuat referensi...</option>
                    </select>
                </div>

                <div class="form-group full-width">
                    <label>Keterangan (Wajib Diisi)</label>
                    <input type="text" id="keterangan" required placeholder="Catatan perihal surat..." autocomplete="off">
                </div>

                <div class="form-group full-width">
                    <label>Nomor Surat (Pratinjau)</label>
                    <div class="input-with-icon">
                        <input type="text" id="nomor" placeholder="Nomor akan terangkai otomatis..." readonly>
                        <button type="button" class="copy-btn" onclick="copyNomor()" title="Salin Nomor Surat">
                            <svg viewBox="0 0 24 24"><path d="M16 1H4C2.9 1 2 1.9 2 3v14h2V3h12V1zm3 4H8C6.9 5 6 5.9 6 7v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/></svg>
                        </button>
                    </div>
                </div>

                <button type="submit" id="btnSubmitPenomoran" class="btn-primary full-width">Ambil & Simpan Nomor</button>
            </form>
        </div>

        <!-- TAB 2: UPLOAD BERKAS SCAN -->
        <div id="upload" class="tab-content form-card">
            <form id="formUpload">
                <div class="form-group full-width">
                    <label>Nomor Surat (Tanpa Spasi)</label>
                    <!-- Validasi Regex untuk mencegah pengetikan spasi -->
                    <input type="text" id="upload_nomor" required placeholder="Contoh: 001/Ket-SK/STAIIS/VII/2026" 
                           pattern="[^\s]+" title="Tidak boleh ada spasi" oninput="this.value = this.value.replace(/\s/g, '')">
                </div>

                <div class="form-group full-width file-upload-box">
                    <label>Upload Hasil Scan (Format PDF)</label>
                    <input type="file" id="upload_file" accept=".pdf" required>
                </div>

                <button type="submit" id="btnSubmitUpload" class="btn-primary full-width">Upload & Hubungkan Dokumen</button>
            </form>
        </div>

    </div>

    <script>
        // MASUKKAN URL GOOGLE APPS SCRIPT ANDA DI SINI
        const urlAPI = "https://script.google.com/macros/s/AKfycbyKRnIKopECo_pADMEP_Cw5soGivDREjgO_2TtmaJkbA2Ru-7mDz6bSlimcVi7FPLh_HQ/exec";
        window.arsipGlobal = [];

        // Fungsi berpindah Tab Navigasi
        function switchTab(tabId, btnElement) {
            document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            btnElement.classList.add('active');
        }

        async function muatDataReferensi() {
            try {
                const res = await fetch(urlAPI);
                const hasil = await res.json();
                
                if (hasil.status === "success") {
                    window.arsipGlobal = hasil.data;

                    const selDivisi = document.getElementById('divisi');
                    selDivisi.innerHTML = `<option value="" disabled selected>-- Pilih Divisi --</option>` + 
                        hasil.kode_divisi.map(item => `<option value="${item.kode}">${item.nama}</option>`).join('');

                    const selJenis = document.getElementById('jenis');
                    selJenis.innerHTML = `<option value="" disabled selected>-- Pilih Jenis Surat --</option>` + 
                        hasil.kode_surat.map(item => `<option value="${item.kode}">${item.nama}</option>`).join('');

                    document.getElementById('loadingStatus').style.display = 'none';
                    generateNomorOtomatis();
                }
            } catch (err) {
                document.getElementById('loadingStatus').innerText = "Gagal memuat data referensi. Periksa jaringan Anda.";
            }
        }

        function copyNomor() {
            const noVal = document.getElementById('nomor').value;
            if (!noVal) return alert("Nomor surat belum terbentuk.");
            navigator.clipboard.writeText(noVal).then(() => alert("Disalin: " + noVal));
        }

        function generateNomorOtomatis() {
            const tglVal = document.getElementById('tanggal').value;
            const divisiKode = document.getElementById('divisi').value;
            const jenisKode = document.getElementById('jenis').value;
            
            if (!tglVal) return document.getElementById('nomor').value = "";

            const inputDate = new Date(tglVal);
            const inputYear = inputDate.getFullYear();
            const inputMonth = inputDate.getMonth() + 1;
            const labelTarget = inputMonth >= 9 ? `${inputYear}-${inputYear+1}` : `${inputYear-1}-${inputYear}`;
            
            const romanMap = { "I":1, "II":2, "III":3, "IV":4, "V":5, "VI":6, "VII":7, "VIII":8, "IX":9, "X":10, "XI":11, "XII":12 };
            const arrayRomawi = ["I", "II", "III", "IV", "V", "VI", "VII", "VIII", "IX", "X", "XI", "XII"];
            const inputRomawi = arrayRomawi[inputMonth - 1];

            let maxUrutan = 0;
            window.arsipGlobal.forEach(item => {
                const parts = (item.nomor || "").split('/');
                if (parts.length >= 5) {
                    const seq = parseInt(parts[0], 10);
                    const bulanLamaRomawi = parts[parts.length - 2];
                    const tahunLama = parseInt(parts[parts.length - 1], 10);
                    const bulanLamaInt = romanMap[bulanLamaRomawi];

                    if (!isNaN(seq) && !isNaN(tahunLama) && bulanLamaInt) {
                        const labelLama = bulanLamaInt >= 9 ? `${tahunLama}-${tahunLama+1}` : `${tahunLama-1}-${tahunLama}`;
                        if (labelLama === labelTarget && seq > maxUrutan) maxUrutan = seq;
                    }
                }
            });

            const urutanSelanjutnya = String(maxUrutan + 1).padStart(3, '0');
            const stringDivisiKode = [divisiKode, jenisKode].filter(Boolean).join('-');
            
            let komponenNomor = [urutanSelanjutnya];
            if (stringDivisiKode) komponenNomor.push(stringDivisiKode);
            komponenNomor.push("STAIIS", inputRomawi, inputYear);

            document.getElementById('nomor').value = komponenNomor.join('/');
        }

        // SUBMIT TAB 1 (Pengambilan Nomor)
        document.getElementById('formPenomoran').addEventListener('submit', async function(e) {
            e.preventDefault(); 
            const tombol = document.getElementById('btnSubmitPenomoran');
            tombol.innerText = "Menyimpan Dokumen...";
            tombol.disabled = true;

            const elDivisi = document.getElementById('divisi');
            const elJenis = document.getElementById('jenis');

            const dataBaru = {
                action: "create",
                tanggal: document.getElementById('tanggal').value,
                divisi: elDivisi.options[elDivisi.selectedIndex].text, 
                jenis: elJenis.options[elJenis.selectedIndex].text,
                nomor: document.getElementById('nomor').value, 
                keterangan: document.getElementById('keterangan').value
            };

            try {
                await fetch(urlAPI, { method: "POST", body: JSON.stringify(dataBaru) });
                alert("Berhasil! Nomor Surat Anda: " + dataBaru.nomor);
                this.reset();
                document.getElementById('nomor').value = ""; 
                muatDataReferensi(); // Muat ulang untuk memperbarui maxUrutan
            } catch (err) {
                alert("Terjadi kesalahan jaringan.");
            } finally {
                tombol.innerText = "Ambil & Simpan Nomor";
                tombol.disabled = false;
            }
        });

        // SUBMIT TAB 2 (Upload File)
        document.getElementById('formUpload').addEventListener('submit', async function(e) {
            e.preventDefault();
            const tombol = document.getElementById('btnSubmitUpload');
            const fileInput = document.getElementById('upload_file');
            const file = fileInput.files[0];

            if (!file) return alert("Pilih file PDF terlebih dahulu.");

            tombol.innerText = "Mengupload File (Mohon Tunggu)...";
            tombol.disabled = true;

            // Mengubah file menjadi format Base64 untuk dikirim lewat JSON
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = async function () {
                const base64String = reader.result.split(',')[1]; // Memisahkan header dari data base64
                
                const uploadPayload = {
                    action: "upload",
                    nomor: document.getElementById('upload_nomor').value,
                    filename: file.name,
                    mimeType: file.type,
                    base64: base64String
                };

                try {
                    // PERBAIKAN: Menambahkan headers text/plain agar tidak diblokir peramban
                    const response = await fetch(urlAPI, { 
                        method: "POST", 
                        headers: { "Content-Type": "text/plain;charset=utf-8" },
                        body: JSON.stringify(uploadPayload) 
                    });
                    
                    const result = await response.json();

                    if (result.status === "success") {
                        alert("Berkas berhasil diupload dan ditautkan ke arsip!");
                        document.getElementById('formUpload').reset();
                    } else {
                        alert("Gagal: " + result.message);
                    }
                } catch (err) {
                    alert("Kesalahan jaringan saat mengupload file. Pastikan URL Apps Script sudah benar.");
                } finally {
                    tombol.innerText = "Upload & Hubungkan Dokumen";
                    tombol.disabled = false;
                }
            };
            reader.onerror = function (error) {
                alert("Gagal membaca file.");
                tombol.innerText = "Upload & Hubungkan Dokumen";
                tombol.disabled = false;
            };
        });

        // Panggil saat web dimuat
        muatDataReferensi();
    </script>
</body>
</html>

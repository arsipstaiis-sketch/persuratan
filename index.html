<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Arsip SK 25-26</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background: #f4f7f6; color: #333; margin: 0; padding: 20px; }
        .container { max-width: 1000px; margin: 0 auto; background: #fff; padding: 25px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        h2 { border-bottom: 2px solid #e1e4e8; padding-bottom: 10px; margin-top: 0; }
        
        /* Form Input */
        form { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 15px; margin-bottom: 30px; }
        .form-group { display: flex; flex-direction: column; }
        .form-group label { font-size: 12px; font-weight: bold; margin-bottom: 5px; color: #555; }
        input { padding: 10px; border: 1px solid #ccc; border-radius: 5px; font-size: 14px; }
        .full-width { grid-column: 1 / -1; }
        
        /* Input khusus untuk nomor otomatis */
        #nomor { background-color: #e9ecef; font-weight: bold; color: #0056b3; cursor: not-allowed; }
        
        button { background: #28a745; color: white; border: none; padding: 12px; border-radius: 5px; font-weight: bold; cursor: pointer; margin-top: 10px;}
        button:disabled { background: #6c757d; cursor: not-allowed; }
        
        /* Tabel Data */
        table { width: 100%; border-collapse: collapse; font-size: 14px; }
        th, td { border: 1px solid #e1e4e8; padding: 10px; text-align: left; }
        th { background: #f8f9fa; }
        a { color: #007bff; text-decoration: none; font-weight: bold; }
        a:hover { text-decoration: underline; }
        
        @media (max-width: 768px) {
            form { grid-template-columns: 1fr; }
            table { display: block; overflow-x: auto; white-space: nowrap; }
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>Tambah Data SK 25-26</h2>
        <form id="formInput">
            <!-- Baris 1: Tanggal & Komponen Nomor -->
            <div class="form-group">
                <label>Tanggal Surat</label>
                <input type="date" id="tanggal" required onchange="generateNomorOtomatis()">
            </div>
            <div class="form-group">
                <label>Nomor Urut</label>
                <input type="text" id="nomor_urut" placeholder="Contoh: 001" required oninput="generateNomorOtomatis()">
            </div>
            <div class="form-group">
                <label>Kode Divisi</label>
                <input type="text" id="divisi" placeholder="Contoh: Ket" required oninput="generateNomorOtomatis()">
            </div>
            <div class="form-group">
                <label>Kode/Jenis Surat</label>
                <input type="text" id="jenis" placeholder="Contoh: SK" required oninput="generateNomorOtomatis()">
            </div>

            <!-- Baris 2: Hasil Nomor Otomatis -->
            <div class="form-group full-width">
                <label>Nomor Surat (Otomatis)</label>
                <input type="text" id="nomor" placeholder="Nomor akan terisi otomatis di sini..." readonly>
            </div>

            <!-- Baris 3: Keterangan & Link -->
            <div class="form-group full-width">
                <label>Keterangan</label>
                <input type="text" id="keterangan" placeholder="Keterangan tambahan (Opsional)">
            </div>
            <div class="form-group full-width">
                <label>Link PDF Dokumen</label>
                <input type="url" id="link" placeholder="https://drive.google.com/...">
            </div>

            <button type="submit" id="btnSubmit" class="full-width">Simpan ke Spreadsheet</button>
        </form>

        <h2>Arsip Dokumen SK 25-26</h2>
        <div id="status">Memuat data...</div>
        <table id="tabelData" style="display:none;">
            <thead>
                <tr>
                    <th>Tanggal</th>
                    <th>Nama Divisi</th>
                    <th>Jenis Surat</th>
                    <th>Nomor Surat</th>
                    <th>Keterangan</th>
                    <th>Dokumen</th>
                </tr>
            </thead>
            <tbody id="badanTabel"></tbody>
        </table>
    </div>

    <script>
        const urlAPI = "https://script.google.com/macros/s/AKfycbyKRnIKopECo_pADMEP_Cw5soGivDREjgO_2TtmaJkbA2Ru-7mDz6bSlimcVi7FPLh_HQ/exec";

        // Fungsi menyusun nomor surat dengan format terbaru
        function generateNomorOtomatis() {
            const tglVal = document.getElementById('tanggal').value;
            const noUrut = document.getElementById('nomor_urut').value;
            const divisi = document.getElementById('divisi').value;
            const jenis = document.getElementById('jenis').value;
            
            let bulanRomawi = "";
            let tahun = "";

            if (tglVal) {
                const dateObj = new Date(tglVal);
                const arrayRomawi = ["I", "II", "III", "IV", "V", "VI", "VII", "VIII", "IX", "X", "XI", "XII"];
                bulanRomawi = arrayRomawi[dateObj.getMonth()];
                tahun = dateObj.getFullYear();
            }

            // 1. Menggabungkan Divisi dan Kode dengan tanda strip (-)
            let gabunganDivisiKode = [];
            if (divisi) gabunganDivisiKode.push(divisi);
            if (jenis) gabunganDivisiKode.push(jenis);
            let stringDivisiKode = gabunganDivisiKode.join('-');

            // 2. Menyusun kerangka nomor dengan tanda miring (/)
            let komponenNomor = [];
            
            if (noUrut) komponenNomor.push(noUrut);
            if (stringDivisiKode) komponenNomor.push(stringDivisiKode);
            
            // 3. Menambahkan teks statis STAIIS dan waktu (Hanya jika form mulai diisi)
            if (noUrut || stringDivisiKode || tglVal) {
                komponenNomor.push("STAIIS");
                if (bulanRomawi) komponenNomor.push(bulanRomawi);
                if (tahun) komponenNomor.push(tahun);
            }

            // Hasil akhir: 001/Divisi-Kode/STAIIS/VII/2026
            document.getElementById('nomor').value = komponenNomor.join('/');
        }

       async function muatData() {
            try {
                const res = await fetch(urlAPI);
                const hasil = await res.json();
                
                if (hasil.status === "success") {
                    const htmlBaris = hasil.data.map(item => {
                        // Fitur pencegah error 404 Vercel
                        let linkAman = item.link;
                        if (linkAman && !linkAman.startsWith('http://') && !linkAman.startsWith('https://')) {
                            linkAman = 'https://' + linkAman;
                        }

                        return `
                            <tr>
                                <td>${item.tanggal}</td>
                                <td>${item.divisi}</td>
                                <td>${item.jenis}</td>
                                <td><strong>${item.nomor}</strong></td>
                                <td>${item.keterangan}</td>
                                <td>${linkAman ? `<a href="${linkAman}" target="_blank">Buka PDF</a>` : '-'}</td>
                            </tr>
                        `;
                    }).join('');
                    
                    document.getElementById('badanTabel').innerHTML = htmlBaris;
                    document.getElementById('status').style.display = 'none';
                    document.getElementById('tabelData').style.display = 'table';
                }
            } catch (err) {
                document.getElementById('status').innerText = "Gagal memuat data dari Spreadsheet.";
            }
        }

        document.getElementById('formInput').addEventListener('submit', async function(e) {
            e.preventDefault(); 
            
            const tombol = document.getElementById('btnSubmit');
            tombol.innerText = "Menyimpan data...";
            tombol.disabled = true;

            const dataBaru = {
                tanggal: document.getElementById('tanggal').value,
                divisi: document.getElementById('divisi').value,
                jenis: document.getElementById('jenis').value,
                nomor: document.getElementById('nomor').value, 
                keterangan: document.getElementById('keterangan').value,
                link: document.getElementById('link').value
            };

            try {
                await fetch(urlAPI, {
                    method: "POST",
                    body: JSON.stringify(dataBaru)
                });
                
                alert("Data berhasil tersimpan dengan Nomor Surat: " + dataBaru.nomor);
                this.reset(); 
                document.getElementById('nomor').value = ""; // Kosongkan nomor otomatis setelah tersimpan
                
                document.getElementById('status').style.display = 'block';
                document.getElementById('status').innerText = "Memperbarui tabel...";
                document.getElementById('tabelData').style.display = 'none';
                muatData();

            } catch (err) {
                alert("Kesalahan jaringan saat menyimpan data.");
            } finally {
                tombol.innerText = "Simpan ke Spreadsheet";
                tombol.disabled = false;
            }
        });

        muatData();
    </script>
</body>
</html>

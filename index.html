<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Arsip SK STAIIS</title>
    <style>
        /* Gaya Minimalis & Ringan (Terinspirasi dari referensi Brutalist-Lite) */
        :root {
            --bg-color: #f7f6f2; /* Warna krem lembut dari referensi web */
            --staiis-green: #128246; /* Hijau utama dari logo */
            --staiis-gold: #f1c40f; /* Kuning dari buku pada logo */
            --text-main: #2b2b2b;
            --text-muted: #666;
            --border-color: #d1d0c9;
        }

        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            background-color: var(--bg-color); 
            color: var(--text-main); 
            margin: 0; 
            padding: 40px 20px;
            /* Efek pendaran halus (menggantikan pendaran merah pada referensi web dengan warna hijau STAIIS) */
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(18, 130, 70, 0.08) 0%, transparent 40%),
                radial-gradient(circle at 85% 20%, rgba(241, 196, 15, 0.04) 0%, transparent 30%);
            background-attachment: fixed;
        }

        .container { 
            max-width: 900px; 
            margin: 0 auto; 
            position: relative;
            z-index: 1;
        }

        h2 { 
            font-weight: 400;
            letter-spacing: 2px;
            text-transform: uppercase;
            font-size: 1.1rem;
            color: var(--staiis-green);
            border-bottom: 1px solid var(--staiis-green); 
            padding-bottom: 15px; 
            margin-top: 0;
            margin-bottom: 30px;
        }
        
        /* Form Input: Garis tipis tanpa sudut membulat (sharp edges) */
        form { 
            display: grid; 
            grid-template-columns: 1fr 1fr 1fr; 
            gap: 25px; 
            margin-bottom: 50px; 
        }
        
        .form-group { display: flex; flex-direction: column; }
        
        .form-group label { 
            font-size: 10px; 
            font-weight: bold; 
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px; 
            color: var(--text-muted); 
        }

        input { 
            padding: 12px; 
            background: transparent;
            border: 1px solid var(--border-color); 
            font-size: 14px; 
            color: var(--text-main);
            outline: none;
            transition: border-color 0.3s ease;
        }

        input:focus {
            border-color: var(--staiis-green);
        }

        .full-width { grid-column: 1 / -1; }
        
        /* Input khusus nomor otomatis */
        #nomor { 
            background-color: rgba(18, 130, 70, 0.03); 
            color: var(--staiis-green); 
            font-weight: 600;
            border-color: rgba(18, 130, 70, 0.3);
            cursor: not-allowed; 
        }
        
        button { 
            background: transparent; 
            color: var(--staiis-green); 
            border: 1px solid var(--staiis-green); 
            padding: 15px; 
            font-size: 12px;
            letter-spacing: 2px;
            text-transform: uppercase;
            font-weight: bold; 
            cursor: pointer; 
            margin-top: 10px;
            transition: all 0.3s ease;
        }

        button:hover:not(:disabled) { 
            background: var(--staiis-green); 
            color: white; 
        }

        button:disabled { 
            border-color: #aaa; 
            color: #aaa;
            cursor: wait; 
        }
        
        /* Tabel Data Minimalis */
        #status {
            font-size: 12px;
            letter-spacing: 1px;
            color: var(--text-muted);
            margin-bottom: 20px;
        }

        table { 
            width: 100%; 
            border-collapse: collapse; 
            font-size: 13px; 
        }

        th, td { 
            border-bottom: 1px solid var(--border-color); 
            padding: 15px 10px; 
            text-align: left; 
        }

        th { 
            font-weight: 500;
            text-transform: uppercase;
            font-size: 10px;
            letter-spacing: 1px;
            color: var(--text-muted); 
        }

        a { 
            color: var(--staiis-green); 
            text-decoration: none; 
            border-bottom: 1px solid transparent;
            transition: border-color 0.3s ease;
        }

        a:hover { 
            border-bottom: 1px solid var(--staiis-green); 
        }
        
        /* Responsivitas Layar Kecil */
        @media (max-width: 768px) {
            form { grid-template-columns: 1fr; gap: 15px; }
            table { display: block; overflow-x: auto; white-space: nowrap; }
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>Penomoran Surat SK 25-26</h2>
        <form id="formInput">
            <div class="form-group">
                <label>Tanggal Surat</label>
                <input type="date" id="tanggal" required onchange="generateNomorOtomatis()">
            </div>
            <div class="form-group">
                <label>Nomor Urut</label>
                <input type="text" id="nomor_urut" placeholder="001" required oninput="generateNomorOtomatis()">
            </div>
            <div class="form-group">
                <label>Kode Divisi</label>
                <input type="text" id="divisi" placeholder="Ket" required oninput="generateNomorOtomatis()">
            </div>
            <div class="form-group">
                <label>Kode Surat</label>
                <input type="text" id="jenis" placeholder="SK" required oninput="generateNomorOtomatis()">
            </div>

            <!-- Hasil Nomor Otomatis -->
            <div class="form-group" style="grid-column: span 2;">
                <label>Nomor Arsip Tersusun</label>
                <input type="text" id="nomor" placeholder="Terisi otomatis..." readonly>
            </div>

            <div class="form-group full-width">
                <label>Keterangan Tambahan</label>
                <input type="text" id="keterangan" placeholder="Isi jika diperlukan...">
            </div>
            <div class="form-group full-width">
                <label>Tautan Dokumen (PDF)</label>
                <input type="text" id="link" placeholder="https://...">
            </div>

            <button type="submit" id="btnSubmit" class="full-width">Simpan Arsip</button>
        </form>

        <h2>Pangkalan Data Arsip</h2>
        <div id="status">Mensinkronisasi data...</div>
        <table id="tabelData" style="display:none;">
            <thead>
                <tr>
                    <th>Tanggal</th>
                    <th>Divisi</th>
                    <th>Jenis</th>
                    <th>Nomor Surat</th>
                    <th>Keterangan</th>
                    <th>Dokumen</th>
                </tr>
            </thead>
            <tbody id="badanTabel"></tbody>
        </table>
    </div>

    <script>
        // Ganti URL ini dengan URL Web App Apps Script Anda yang valid
        const urlAPI = "https://script.google.com/macros/s/AKfycbyKRnIKopECo_pADMEP_Cw5soGivDREjgO_2TtmaJkbA2Ru-7mDz6bSlimcVi7FPLh_HQ/exec";

        function generateNomorOtomatis() {
            const tglVal = document.getElementById('tanggal').value;
            const noUrut = document.getElementById('nomor_urut').value;
            const divisi = document.getElementById('divisi').value;
            const jenis = document.getElementById('jenis').value;
            
            let bulanRomawi = "";
            let tahun = "";

            if (tglVal) {
                const dateObj = new Date(tglVal);
                const arrayRomawi = ["I", "II", "III", "IV", "V", "VI", "VII", "VIII", "IX", "X", "XI", "XII"];
                bulanRomawi = arrayRomawi[dateObj.getMonth()];
                tahun = dateObj.getFullYear();
            }

            let stringDivisiKode = [divisi, jenis].filter(Boolean).join('-');
            let komponenNomor = [];
            
            if (noUrut) komponenNomor.push(noUrut);
            if (stringDivisiKode) komponenNomor.push(stringDivisiKode);
            
            if (noUrut || stringDivisiKode || tglVal) {
                komponenNomor.push("STAIIS");
                if (bulanRomawi) komponenNomor.push(bulanRomawi);
                if (tahun) komponenNomor.push(tahun);
            }

            document.getElementById('nomor').value = komponenNomor.join('/');
        }

        async function muatData() {
            try {
                const res = await fetch(urlAPI);
                const hasil = await res.json();
                
                if (hasil.status === "success") {
                    const htmlBaris = hasil.data.map(item => {
                        // Mencegah error 404 Vercel pada tautan
                        let linkAman = item.link;
                        if (linkAman && !linkAman.startsWith('http://') && !linkAman.startsWith('https://')) {
                            linkAman = 'https://' + linkAman;
                        }

                        return `
                            <tr>
                                <td>${item.tanggal}</td>
                                <td>${item.divisi}</td>
                                <td>${item.jenis}</td>
                                <td><strong>${item.nomor}</strong></td>
                                <td>${item.keterangan}</td>
                                <td>${linkAman ? `<a href="${linkAman}" target="_blank">Unduh</a>` : '-'}</td>
                            </tr>
                        `;
                    }).join('');
                    
                    document.getElementById('badanTabel').innerHTML = htmlBaris;
                    document.getElementById('status').style.display = 'none';
                    document.getElementById('tabelData').style.display = 'table';
                }
            } catch (err) {
                document.getElementById('status').innerText = "Gagal terhubung ke pusat data.";
            }
        }

        document.getElementById('formInput').addEventListener('submit', async function(e) {
            e.preventDefault(); 
            
            const tombol = document.getElementById('btnSubmit');
            tombol.innerText = "Memproses...";
            tombol.disabled = true;

            const dataBaru = {
                tanggal: document.getElementById('tanggal').value,
                divisi: document.getElementById('divisi').value,
                jenis: document.getElementById('jenis').value,
                nomor: document.getElementById('nomor').value, 
                keterangan: document.getElementById('keterangan').value,
                link: document.getElementById('link').value
            };

            try {
                await fetch(urlAPI, {
                    method: "POST",
                    body: JSON.stringify(dataBaru)
                });
                
                this.reset(); 
                document.getElementById('nomor').value = ""; 
                
                document.getElementById('status').style.display = 'block';
                document.getElementById('status').innerText = "Memperbarui data...";
                document.getElementById('tabelData').style.display = 'none';
                muatData();

            } catch (err) {
                alert("Kesalahan jaringan saat menyimpan data.");
            } finally {
                tombol.innerText = "Simpan Arsip";
                tombol.disabled = false;
            }
        });

        muatData();
    </script>
</body>
</html>

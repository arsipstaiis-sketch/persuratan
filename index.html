<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Arsip SK STAIIS</title>
    <style>
        /* Desain Modern SaaS - Ringan & Efisien */
        :root {
            --staiis-green: #128246;
            --staiis-green-hover: #0e6b39;
            --staiis-gold: #f1c40f;
            --text-dark: #1f2124;
            --text-gray: #5e6b73;
            --bg-light: #f7f9fc;
            --border-light: #e1e4e8;
            --input-bg: #ffffff;
        }

        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen, Ubuntu, Cantarell, "Open Sans", "Helvetica Neue", sans-serif;
            background-color: #ffffff; 
            color: var(--text-dark); 
            margin: 0; 
            padding: 40px 20px;
            -webkit-font-smoothing: antialiased;
        }

        .container { 
            max-width: 960px; 
            margin: 0 auto; 
        }

        /* Tipografi ala SaaS (Tebal & Modern) */
        .header-section {
            text-align: center;
            margin-bottom: 50px;
        }

        .header-section h1 {
            font-size: 2.8rem;
            font-weight: 800;
            letter-spacing: -1px;
            margin: 0 0 10px 0;
            color: var(--text-dark);
        }

        .header-section h1 span {
            color: var(--staiis-green);
        }

        .header-section p {
            font-size: 1.1rem;
            color: var(--text-gray);
            margin: 0;
        }
        
        /* Form Card */
        .form-card {
            background: var(--bg-light);
            border: 1px solid var(--border-light);
            border-radius: 16px;
            padding: 35px;
            margin-bottom: 50px;
        }

        form { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); 
            gap: 20px; 
        }
        
        .form-group { display: flex; flex-direction: column; }
        
        .form-group label { 
            font-size: 13px; 
            font-weight: 600; 
            margin-bottom: 8px; 
            color: var(--text-dark); 
        }

        input { 
            padding: 14px 16px; 
            background: var(--input-bg);
            border: 1px solid var(--border-light); 
            border-radius: 10px;
            font-size: 15px; 
            color: var(--text-dark);
            transition: all 0.2s ease;
            outline: none;
        }

        input::placeholder { color: #a0aec0; }

        input:focus {
            border-color: var(--staiis-green);
            box-shadow: 0 0 0 3px rgba(18, 130, 70, 0.15);
        }

        .full-width { grid-column: 1 / -1; }
        
        /* Input khusus nomor otomatis */
        #nomor { 
            background-color: #edf2f0; 
            color: var(--staiis-green); 
            font-weight: 700;
            font-size: 16px;
            border-color: transparent;
            cursor: not-allowed; 
        }
        
        button { 
            background: var(--staiis-green); 
            color: white; 
            border: none; 
            padding: 16px; 
            border-radius: 10px;
            font-size: 16px;
            font-weight: 700; 
            cursor: pointer; 
            margin-top: 10px;
            transition: all 0.2s ease;
            box-shadow: 0 4px 6px rgba(18, 130, 70, 0.2);
        }

        button:hover:not(:disabled) { 
            background: var(--staiis-green-hover); 
            transform: translateY(-1px);
            box-shadow: 0 6px 12px rgba(18, 130, 70, 0.3);
        }

        button:disabled { 
            background: #cbd5e0;
            box-shadow: none;
            cursor: wait; 
            transform: none;
        }
        
        /* Bagian Tabel */
        .table-section h2 {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 20px;
            color: var(--text-dark);
            border-bottom: 2px solid var(--border-light);
            padding-bottom: 15px;
        }

        #status {
            font-size: 14px;
            color: var(--text-gray);
            margin-bottom: 20px;
            display: inline-block;
            background: var(--bg-light);
            padding: 8px 16px;
            border-radius: 20px;
        }

        .table-container {
            overflow-x: auto;
            border: 1px solid var(--border-light);
            border-radius: 12px;
        }

        table { 
            width: 100%; 
            border-collapse: collapse; 
            font-size: 14px; 
            background: white;
        }

        th, td { 
            padding: 16px 20px; 
            text-align: left; 
            border-bottom: 1px solid var(--border-light);
        }

        th { 
            font-weight: 600;
            color: var(--text-gray); 
            background: var(--bg-light);
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        tr:last-child td { border-bottom: none; }

        tr:hover td { background-color: #fcfcfc; }

        a { 
            color: var(--staiis-green); 
            text-decoration: none; 
            font-weight: 600;
            background: rgba(18, 130, 70, 0.1);
            padding: 6px 12px;
            border-radius: 6px;
            transition: background 0.2s;
        }

        a:hover { 
            background: rgba(18, 130, 70, 0.2); 
        }
        
        @media (max-width: 768px) {
            .header-section h1 { font-size: 2.2rem; }
            .form-card { padding: 25px; }
            form { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header-section">
            <h1>Sistem Penomoran <span>STAIIS</span></h1>
            <p>Kelola, buat, dan arsipkan Surat Keputusan dalam satu platform cepat.</p>
        </div>

        <div class="form-card">
            <form id="formInput">
                <div class="form-group">
                    <label>Tanggal Surat</label>
                    <input type="date" id="tanggal" required onchange="generateNomorOtomatis()">
                </div>
                <div class="form-group">
                    <label>Nomor Urut</label>
                    <input type="text" id="nomor_urut" placeholder="Misal: 001" required oninput="generateNomorOtomatis()" autocomplete="off">
                </div>
                <div class="form-group">
                    <label>Kode Divisi</label>
                    <input type="text" id="divisi" placeholder="Misal: Ket" required oninput="generateNomorOtomatis()" autocomplete="off">
                </div>
                <div class="form-group">
                    <label>Kode Surat</label>
                    <input type="text" id="jenis" placeholder="Misal: SK" required oninput="generateNomorOtomatis()" autocomplete="off">
                </div>

                <!-- Hasil Nomor Otomatis -->
                <div class="form-group full-width">
                    <label>Pratinjau Nomor Arsip</label>
                    <input type="text" id="nomor" placeholder="Nomor akan terangkai otomatis..." readonly>
                </div>

                <div class="form-group full-width">
                    <label>Keterangan Tambahan (Opsional)</label>
                    <input type="text" id="keterangan" placeholder="Catatan perihal surat..." autocomplete="off">
                </div>
                <div class="form-group full-width">
                    <label>Tautan Google Drive (PDF)</label>
                    <input type="text" id="link" placeholder="Salin link dokumen di sini..." autocomplete="off">
                </div>

                <button type="submit" id="btnSubmit" class="full-width">Simpan ke Basis Data</button>
            </form>
        </div>

        <div class="table-section">
            <h2>Arsip Dokumen Aktif</h2>
            <div id="status">Mensinkronisasi data...</div>
            <div class="table-container" style="display:none;" id="tabelContainer">
                <table>
                    <thead>
                        <tr>
                            <th>Tanggal</th>
                            <th>Divisi</th>
                            <th>Jenis</th>
                            <th>Nomor Referensi</th>
                            <th>Keterangan</th>
                            <th>Berkas</th>
                        </tr>
                    </thead>
                    <tbody id="badanTabel"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        // Ganti URL ini dengan URL Web App Apps Script Anda yang valid
        const urlAPI = "https://script.google.com/macros/s/AKfycbyKRnIKopECo_pADMEP_Cw5soGivDREjgO_2TtmaJkbA2Ru-7mDz6bSlimcVi7FPLh_HQ/exec";

        function generateNomorOtomatis() {
            const tglVal = document.getElementById('tanggal').value;
            const noUrut = document.getElementById('nomor_urut').value;
            const divisi = document.getElementById('divisi').value;
            const jenis = document.getElementById('jenis').value;
            
            let bulanRomawi = "";
            let tahun = "";

            if (tglVal) {
                const dateObj = new Date(tglVal);
                const arrayRomawi = ["I", "II", "III", "IV", "V", "VI", "VII", "VIII", "IX", "X", "XI", "XII"];
                bulanRomawi = arrayRomawi[dateObj.getMonth()];
                tahun = dateObj.getFullYear();
            }

            let stringDivisiKode = [divisi, jenis].filter(Boolean).join('-');
            let komponenNomor = [];
            
            if (noUrut) komponenNomor.push(noUrut);
            if (stringDivisiKode) komponenNomor.push(stringDivisiKode);
            
            if (noUrut || stringDivisiKode || tglVal) {
                komponenNomor.push("STAIIS");
                if (bulanRomawi) komponenNomor.push(bulanRomawi);
                if (tahun) komponenNomor.push(tahun);
            }

            document.getElementById('nomor').value = komponenNomor.join('/');
        }

        async function muatData() {
            try {
                const res = await fetch(urlAPI);
                const hasil = await res.json();
                
                if (hasil.status === "success") {
                    const htmlBaris = hasil.data.map(item => {
                        let linkAman = item.link;
                        if (linkAman && !linkAman.startsWith('http://') && !linkAman.startsWith('https://')) {
                            linkAman = 'https://' + linkAman;
                        }

                        return `
                            <tr>
                                <td>${item.tanggal}</td>
                                <td>${item.divisi}</td>
                                <td>${item.jenis}</td>
                                <td><strong>${item.nomor}</strong></td>
                                <td>${item.keterangan}</td>
                                <td>${linkAman ? `<a href="${linkAman}" target="_blank">Lihat PDF</a>` : '-'}</td>
                            </tr>
                        `;
                    }).join('');
                    
                    document.getElementById('badanTabel').innerHTML = htmlBaris;
                    document.getElementById('status').style.display = 'none';
                    document.getElementById('tabelContainer').style.display = 'block';
                }
            } catch (err) {
                document.getElementById('status').innerText = "Gagal terhubung ke pusat data. Periksa jaringan Anda.";
            }
        }

        document.getElementById('formInput').addEventListener('submit', async function(e) {
            e.preventDefault(); 
            
            const tombol = document.getElementById('btnSubmit');
            tombol.innerText = "Menyimpan Dokumen...";
            tombol.disabled = true;

            const dataBaru = {
                tanggal: document.getElementById('tanggal').value,
                divisi: document.getElementById('divisi').value,
                jenis: document.getElementById('jenis').value,
                nomor: document.getElementById('nomor').value, 
                keterangan: document.getElementById('keterangan').value,
                link: document.getElementById('link').value
            };

            try {
                await fetch(urlAPI, {
                    method: "POST",
                    body: JSON.stringify(dataBaru)
                });
                
                this.reset(); 
                document.getElementById('nomor').value = ""; 
                
                document.getElementById('status').style.display = 'inline-block';
                document.getElementById('status').innerText = "Memperbarui arsip...";
                document.getElementById('tabelContainer').style.display = 'none';
                muatData();

            } catch (err) {
                alert("Terjadi kesalahan jaringan saat mencoba menyimpan data.");
            } finally {
                tombol.innerText = "Simpan ke Basis Data";
                tombol.disabled = false;
            }
        });

        muatData();
    </script>
</body>
</html>
